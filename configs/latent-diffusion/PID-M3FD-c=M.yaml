# =============================================================================
# PID – M3FD dataset  |  Conditional mode: c=M (concat mode)
# =============================================================================
# Adaptado de PID-KAIST-c=M.yaml para el dataset M3FD.
#
# Cambios respecto a KAIST:
#   - data.train/validation apuntan a ldm.data.M3FD.*
#   - batch_size reducido a 4 (RTX 4050, 6 GB VRAM)
#   - num_workers reducido a 2 para Windows
#   - TeVNet checkpoint: KAIST (baseline; reemplazar por M3FD si se entrena uno)
#
# Para entrenar:
#   python main.py -t True -b configs/latent-diffusion/PID-M3FD-c=M.yaml \
#       --gpus 0, \
#       model.params.ckpt_path=pretrained/PID_KAIST/last.ckpt
# =============================================================================

model:
  base_learning_rate: 1.0e-06
  target: ldm.models.diffusion.ddpm_tev.LatentDiffusion
  params:
    load_only_unet: True
    tevloss_weight_rec: 0
    tevloss_weight_tev: 0
    pixel_tev: true
    vnums: 4
    linear_start: 0.0015
    linear_end: 0.0205
    log_every_t: 100
    timesteps: 1000
    loss_type: l1
    first_stage_key: image
    cond_stage_key: conditional
    image_size: 64
    channels: 4
    concat_mode: true
    monitor: val/loss_simple_ema
    cond_stage_trainable: true

    unet_config:
      target: ldm.modules.diffusionmodules.openaimodel.UNetModel
      params:
        image_size: 64
        in_channels: 7          # 4 latentes IR + 3 canales RGB downsampled
        out_channels: 4
        model_channels: 128
        attention_resolutions:
          - 8
          - 4
          - 2
        num_res_blocks: 2
        channel_mult:
          - 1
          - 4
          - 8
        num_head_channels: 8

    # VQGAN – pesos extraídos del checkpoint PID (el servidor ommer-lab está caído)
    first_stage_config:
      target: ldm.models.autoencoder.VQModelInterface
      params:
        ckpt_path: "./pretrained/vqf8_pretrained/model.ckpt"
        embed_dim: 4
        n_embed: 16384
        monitor: val/rec_loss
        ddconfig:
          double_z: false
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
            - 1
            - 2
            - 2
            - 4
          num_res_blocks: 2
          attn_resolutions:
            - 32
          dropout: 0
        lossconfig:
          target: torch.nn.Identity

    cond_stage_config:
      target: ldm.modules.encoders.modules.SpatialRescaler
      params:
        n_stages: 3
        method: bicubic
        in_channels: 3
        out_channels: 3

    # TeVNet – checkpoint KAIST usado como baseline (PSNR=11.29, SSIM=0.393)
    # Reemplazar por un checkpoint entrenado en M3FD cuando esté disponible
    tev_net_config:
      target: ldm.modules.HADARNet.modules.HADARNet
      params:
        in_channels: 3
        out_channels: 6
        smp_model: Unet
        smp_encoder: resnet18
        ckpt_path: "./pretrained/TeVNet_KAIST/epoch_950.pth"

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 4          # reducido para 6 GB VRAM (RTX 4050)
    num_workers: 4          # 4 en Kaggle/Linux; bajar a 2 en Windows
    wrap: false
    train:
      target: ldm.data.M3FD.M3FDTrain
      params:
        size: 512
        flip_p: 0.5
        crop_p: 0.5
    validation:
      target: ldm.data.M3FD.M3FDVal
      params:
        size: 512
